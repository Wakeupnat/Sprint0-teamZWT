name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # 给这个 Job 赋予写入 Packages 的权限，这样才能把镜像推送到 GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          # 这是 GHCR 的地址，注意要写全
          registry: ghcr.io
          # 这个环境变量是 GitHub 自动生成的，可以直接用来登录 GHCR
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        # 注意下面镜像的命名规则，必须是小写
        run: docker build -t ghcr.io/${{ github.repository_owner }}/hotel-ai:latest .

      - name: Push Docker image to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/hotel-ai:latest
