name: 酒店AI预订系统 CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 编译并运行所有单元测试
        run: mvn clean test

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: target/surefire-reports/
