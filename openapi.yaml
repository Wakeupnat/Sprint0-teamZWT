openapi: 3.0.3
info:
  title: HotelAI 后端API接口文档
  description: 酒店AI助手系统后端接口，包含用户登录注册、AI对话等功能
  version: 1.0.0
  contact:
    name: 小组作业
servers:
  - url: http://localhost:8080
    description: 本地开发环境

paths:
  # 1. 用户注册接口
  /api/user/register:
    post:
      tags:
        - 用户管理
      summary: 用户注册
      description: 新用户注册，用户名唯一，密码加密存储
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: testuser
              password: 123456
              phone: 13800138000
              email: test@example.com
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                code: "200"
                message: 注册成功
                username: testuser
        '500':
          description: 注册失败（用户名已存在/参数不合法）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "500"
                message: 用户名已存在

  # 2. 用户登录接口
  /api/user/login:
    post:
      tags:
        - 用户管理
      summary: 用户登录
      description: 用户登录，验证用户名密码，返回JWT令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: testuser
              password: 123456
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                code: "200"
                message: 登录成功
                token: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ0ZXN0dXNlciIsImlhdCI6MTcxNzYwMTY0MSwiZXhwIjoxNzE3NjA4ODQxfQ.xxxx
                username: testuser
        '500':
          description: 登录失败（用户名不存在/密码错误/账号禁用）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "500"
                message: 密码错误

  # 3. AI同步聊天接口（你项目原有接口）
  /api/chat/sync:
    post:
      tags:
        - AI对话
      summary: 同步AI对话
      description: 向AI发送问题，同步返回回答（需携带登录获取的JWT令牌）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            example:
              message: 帮我推荐酒店
      responses:
        '200':
          description: 对话成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              example:
                code: "200"
                message: 请求成功
                data: 为您推荐XX酒店，位置优越，设施齐全...
        '401':
          description: 未授权（JWT令牌无效/过期）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "401"
                message: 令牌无效，请重新登录
        '500':
          description: 服务器错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "500"
                message: 服务器内部错误

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # 注册请求体
    RegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名（唯一，不可重复）
          example: testuser
        password:
          type: string
          description: 密码（长度≥6位）
          example: 123456
        phone:
          type: string
          description: 手机号（可选）
          example: 13800138000
        email:
          type: string
          description: 邮箱（可选）
          example: test@example.com

    # 注册响应体
    RegisterResponse:
      type: object
      properties:
        code:
          type: string
          description: 响应码（200成功，500失败）
          example: "200"
        message:
          type: string
          description: 响应消息
          example: 注册成功
        username:
          type: string
          description: 注册成功的用户名
          example: testuser

    # 登录请求体
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
          example: testuser
        password:
          type: string
          description: 密码
          example: 123456

    # 登录响应体
    LoginResponse:
      type: object
      properties:
        code:
          type: string
          description: 响应码（200成功，500失败）
          example: "200"
        message:
          type: string
          description: 响应消息
          example: 登录成功
        token:
          type: string
          description: JWT令牌，用于后续接口鉴权
          example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ0ZXN0dXNlciIsImlhdCI6MTcxNzYwMTY0MSwiZXhwIjoxNzE3NjA4ODQxfQ.xxxx
        username:
          type: string
          description: 登录用户名
          example: testuser

    # AI聊天请求体
    ChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: 用户发送的对话内容
          example: 帮我推荐酒店

    # AI聊天响应体
    ChatResponse:
      type: object
      properties:
        code:
          type: string
          description: 响应码（200成功，500失败）
          example: "200"
        message:
          type: string
          description: 响应消息
          example: 请求成功
        data:
          type: string
          description: AI返回的回答内容
          example: 为您推荐XX酒店，位置优越，设施齐全，适合入住...

    # 通用错误响应体
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: 错误码
          example: "500"
        message:
          type: string
          description: 错误信息
          example: 用户名不存在